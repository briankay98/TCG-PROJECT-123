<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCG Marketplace</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>TCG Marketplace</h1>
        </header>
        
        <main>
            <div class="search-section">
                <div class="basic-search">
                    <input type="text" id="searchInput" placeholder="Search for cards..." />
                    <button id="searchBtn">Search</button>
                </div>
                
                <div class="basic-filters">
                    <div class="price-filter">
                        <label for="minPrice">Min Price:</label>
                        <input type="number" id="minPrice" placeholder="0.00" step="0.01" />
                        <label for="maxPrice">Max Price:</label>
                        <input type="number" id="maxPrice" placeholder="1000.00" step="0.01" />
                    </div>
                </div>
                
                <!-- Advanced Filters Toggle -->
                <div class="advanced-toggle">
                    <button id="advancedToggleBtn">Show Advanced Filters</button>
                </div>
                
                <!-- Advanced Filters Panel -->
                <div id="advancedFilters" class="advanced-filters hidden">
                    <h3>Advanced Filters</h3>
                    
                    <div class="filter-group">
                        <label for="raritySelect">Rarity:</label>
                        <select id="raritySelect">
                            <option value="">All Rarities</option>
                            <option value="common">Common</option>
                            <option value="uncommon">Uncommon</option>
                            <option value="rare">Rare</option>
                            <option value="mythic">Mythic Rare</option>
                            <option value="legendary">Legendary</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label for="languageSelect">Language:</label>
                        <select id="languageSelect">
                            <option value="">All Languages</option>
                            <option value="english">English</option>
                            <option value="japanese">Japanese</option>
                            <option value="korean">Korean</option>
                            <option value="chinese">Chinese</option>
                            <option value="spanish">Spanish</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label>Sale Type:</label>
                        <div class="checkbox-group">
                            <label><input type="checkbox" id="auctionType" value="auction" /> Auction</label>
                            <label><input type="checkbox" id="buyNowType" value="buyNow" /> Buy It Now</label>
                            <label><input type="checkbox" id="bestOfferType" value="bestOffer" /> Best Offer</label>
                        </div>
                    </div>
                    
                    <div class="filter-group">
                        <label>Platform:</label>
                        <div class="checkbox-group">
                            <label><input type="checkbox" id="ebayPlatform" value="ebay" /> eBay</label>
                            <label><input type="checkbox" id="tcgPlayerPlatform" value="tcgplayer" /> TCGPlayer</label>
                            <label><input type="checkbox" id="yuyuteiPlatform" value="yuyu-tei" /> Yuyu-tei</label>
                        </div>
                    </div>
                    
                    <div class="filter-group">
                        <label>Date Range:</label>
                        <div class="date-range">
                            <input type="date" id="startDate" />
                            <span>to</span>
                            <input type="date" id="endDate" />
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="results-section">
                <div id="resultsCount" class="results-count"></div>
                <div id="resultsContainer" class="results-container">
                    <!-- Results will be populated by JavaScript -->
                </div>
            </div>
        </main>
    </div>
    
    <script src="js/main.js"></script>
</body>
</html>
